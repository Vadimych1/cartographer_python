name: Build Python Wheels

on:
  push:
    branches:
      - 'master'

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            cibw_archs: "x86_64 aarch64"
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platform: arm64

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.1
        env:
          CIBW_ARCHS_LINUX: ${{ matrix.cibw_archs }}
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          CIBW_BEFORE_ALL_LINUX: |
            apt-get update
            apt-get install -y \
              google-mock \
              libceres-dev \
              liblua5.3-dev \
              libprotobuf-dev \
              protobuf-compiler \
              libboost-all-dev \
              libgflags-dev \
              libgoogle-glog-dev \
              libatlas-base-dev \
              libeigen3-dev \
              cmake \
              ninja-build \
              libunwind-dev \
              libabsl-dev \
              libcairo-dev
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.cibw_archs }}
          path: ./wheelhouse/*.whl
  
